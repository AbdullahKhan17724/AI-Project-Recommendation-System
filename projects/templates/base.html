<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Project Recommender{% endblock %}</title>
    <style>
        :root {
            --primary: #667eea;
            --primary-light: #764ba2;
            --dark: #0f0c29;
            --dark-mid: #302b63;
            --dark-light: #24243e;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.4);
            --card-bg: rgba(255, 255, 255, 0.06);
            --card-border: rgba(255, 255, 255, 0.1);
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            --radius: 16px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, var(--dark), var(--dark-mid), var(--dark-light));
            min-height: 100vh;
            color: var(--text-primary);
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        /* Navbar */
        .navbar {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            padding: 16px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .navbar-brand {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
          
         text-decoration: none;
        }

        .navbar-links {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .navbar-links a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            transition: var(--transition);
        }

        .navbar-links a:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }

        .navbar-links a.active {
            background: rgba(102, 126, 234, 0.25);
            color: #a8b5ff;
        }

        /* Cards */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 20px;
            transition: var(--transition);
        }

        .card:hover {
            border-color: rgba(102, 126, 234, 0.3);
        }

        .card-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .card-text {
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 12px 28px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px -10px rgba(102, 126, 234, 0.5);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-secondary);
            border: 1px solid var(--card-border);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 13px;
        }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-success {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .badge-warning {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
            border: 1px solid rgba(251, 191, 36, 0.2);
        }

        .badge-approve {
            background: rgba(102, 126, 234, 0.25);
            color: #a8b5ff;
            border: 1px solid rgba(102, 126, 234, 0.25);
        }

        /* Grid */
        .row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .row-2 {
            grid-template-columns: 1fr 1fr;
        }

        @media (max-width: 768px) {
            .row-2 {
                grid-template-columns: 1fr;
            }
            .navbar {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }
            .navbar-links {
                justify-content: center;
            }
        }

        /* Stats */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin: 20px 0;
        }

        .stat-item {
            text-align: center;
            padding: 16px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 12px;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Form */
        .form-control {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            transition: var(--transition);
            outline: none;
        }

        .form-control:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
        }

        .form-control::placeholder {
            color: var(--text-muted);
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        /* Checkbox grid */
        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 8px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            max-height: 260px;
            overflow-y: auto;
            border: 1px solid var(--card-border);
        }

        .checkbox-grid::-webkit-scrollbar {
            width: 6px;
        }
        .checkbox-grid::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }
        .checkbox-grid::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 12px;
            border-radius: 8px;
            transition: var(--transition);
            cursor: pointer;
        }

        .checkbox-item:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
            cursor: pointer;
            flex-shrink: 0;
        }

        .checkbox-item label {
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            margin: 0;
            font-weight: 400;
        }

        .checkbox-item input[type="checkbox"]:checked+label {
            color: #fff;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 20px;
            color: var(--text-muted);
            font-size: 13px;
            border-top: 1px solid var(--card-border);
            margin-top: 30px;
        }

        /* Misc */
        .text-center {
            text-align: center;
        }
        .text-muted {
            color: var(--text-muted);
        }
        .text-secondary {
            color: var(--text-secondary);
        }
        .mt-2 {
            margin-top: 20px;
        }
        .mb-2 {
            margin-bottom: 20px;
        }
        .gap-2 {
            gap: 10px;
        }
        .flex {
            display: flex;
        }
        .flex-center {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .flex-wrap {
            flex-wrap: wrap;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .skill-tag {
            display: inline-block;
            padding: 4px 14px;
            background: rgba(102, 126, 234, 0.2);
            border: 1px solid rgba(102, 126, 234, 0.25);
            border-radius: 20px;
            color: #a8b5ff;
            font-size: 13px;
            margin: 3px;
        }

        .skill-tag-missing {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.25);
            color: #f87171;
        }

        .match-score {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
        }

        .project-card {
            padding: 20px;
            border-bottom: 1px solid var(--card-border);
        }

        .project-card:last-child {
            border-bottom: none;
        }

        /* Notification */
        .notification {
            padding: 14px 20px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-weight: 500;
        }
        .notification-success {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #34d399;
        }
        .notification-error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="container">
        <!-- Navbar -->
        <nav class="navbar">
            <a href="/" class="navbar-brand">🎯 AI Project Recommender</a>
            <div class="navbar-links">
                <a href="/" class="{% if request.path == '/' %}active{% endif %}">Home</a>
                <a href="/register/" class="{% if '/register' in request.path %}active{% endif %}">Get Started</a>
                <a href="/dashboard/" class="{% if '/dashboard' in request.path %}active{% endif %}">Dashboard</a>
            </div>
        </nav>

        <!-- Main Content -->
        {% block content %}{% endblock %}

        <!-- Footer -->
        <div class="footer">
            © 2026 AI Project Recommender System | Built with Django & Random Forest
        </div>
    </div>

    {% block extra_js %}{% endblock %}
</body>
</html>
